<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anim Customization Test</title>
    <link rel="stylesheet" href="../styles/anim.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <script src="../components/Anim.js"></script>
</head>
<body style="background: #eee; padding: 50px;">
    <div id="test-custom" style="max-width: 800px; margin: 0 auto;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('test-custom');
            // Testing custom IN (from right) and custom OUT (sink down)
            Anim.boom(container, "Custom Animation Test", {
                word: "CUSTOM",
                subtitle: "Testing In/Out Overrides",
                accent: "#ff7eb9",
                in: { x: 1920, rotate: 45, duration: 2, ease: "slow(0.7, 0.7, false)" },
                out: { y: 500, opacity: 0, duration: 2, ease: "power4.in" }
            });
        });
    </script>
</body>
</html>
